- name: Check if API user exists
  become: true
  shell: |
      pveum user list --output-format json | jq -r '.[].userid' | grep -qx "{{ api_user }}@{{ api_realm }}"
  args:
      executable: /bin/bash
  register: _api_user_check
  changed_when: false
  failed_when: false

- name: Check if API group exists
  become: true
  shell: |
      pveum group list --output-format json | jq -r '.[].groupid' | grep -qx "{{ api_group }}"
  args:
      executable: /bin/bash
  register: _api_group_check
  changed_when: false
  failed_when: false

- name: Check if API role exists
  become: true
  shell: |
      pveum role list --output-format json | jq -r '.[].roleid' | grep -qx "{{ api_role }}"
  args:
      executable: /bin/bash
  register: _api_role_check
  changed_when: false
  failed_when: false

- name: Check if API token exists
  become: true
  shell: |
      pveum user token list {{ api_user }}@{{ api_realm }} --output-format json 2>/dev/null | jq -r '.[].tokenid' | grep -qx "{{ api_token_name }}"
  args:
      executable: /bin/bash
  register: _api_token_check
  changed_when: false
  failed_when: false

- name: Create API group if missing
  become: true
  command: pveum group add {{ api_group }} --comment "API group created by Ansible"
  when: _api_group_check.rc != 0
  register: _create_group
  changed_when: true

- name: Create API user if missing
  become: true
  shell: |
      pveum user add {{ api_user }}@{{ api_realm }} --password "$(openssl rand -base64 16)" --comment "API user created by Ansible"
  when: _api_user_check.rc != 0
  register: _create_user

- name: Create API role if missing
  become: true
  command: pveum role add {{ api_role }} -privs "{{ api_role_privs }}"
  when: _api_role_check.rc != 0
  register: _create_role
  changed_when: true

- name: Assign role to group at root path
  become: true
  command: pveum aclmod {{ api_perm_path }} -group {{ api_group }} -role {{ api_role }}
  register: _assign_role
  changed_when: true
  retries: 5
  delay: 2
  until: _assign_role.rc == 0

- name: Create API token if missing
  become: true
  command: pveum user token add {{ api_user }}@{{ api_realm }} {{ api_token_name }} -privsep 0 -comment "API token for automation"
  when: _api_token_check.rc != 0
  register: _create_token

- name: Check if API user is in API group
  become: true
  shell: |
      set -o pipefail
      pveum group members {{ api_group }} | grep -qw "{{ api_user }}@{{ api_realm }}"
  args:
      executable: /bin/bash
  register: _user_in_group_check
  changed_when: false
  failed_when: false

- name: Add API user to API group
  become: true
  command: pveum user modify {{ api_user }}@{{ api_realm }} -groups {{ api_group }}
  register: _add_user_to_group
  changed_when: true
  when: _user_in_group_check.rc != 0

- name: Extract token secret from output
  when: _create_token is defined and _create_token.stdout | length > 0
  set_fact:
      api_token_secret: "{{ _create_token.stdout | regex_search('value\\s+([a-f0-9-]+)', '\\1') | first }}"

- name: Save token details locally (human readable)
  when: _create_token is defined and _create_token.stdout | length > 0
  delegate_to: localhost
  become: false
  run_once: true
  copy:
      dest: "{{ token_output_file }}"
      content: "{{ _create_token.stdout | trim }}\n"
      mode: "0600"

- name: Write API credentials to Terraform auto.tfvars
  when: _create_token is defined and api_token_secret is defined
  delegate_to: localhost
  become: false
  run_once: true
  copy:
      dest: "{{ terraform_auto_tfvars }}"
      content: |
          # Auto-generated by Ansible proxmox role
          # This file is automatically loaded by Terraform
          pm_api_url          = "https://{{ ansible_host }}:8006/api2/json"
          pm_tls_insecure     = true
          pm_api_token_id     = "{{ api_user }}@{{ api_realm }}!{{ api_token_name }}"
          pm_api_token_secret = "{{ api_token_secret }}"
          default_target_node = "{{ node }}"
      mode: "0600"

- name: Display API token information
  when: _create_token is defined and api_token_secret is defined
  debug:
      msg:
          - "API token created successfully!"
          - "Token ID: {{ api_user }}@{{ api_realm }}!{{ api_token_name }}"
          - "Terraform configuration written to: {{ terraform_auto_tfvars }}"
          - "Human-readable token saved to: {{ token_output_file }}"
