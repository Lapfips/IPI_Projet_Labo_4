- name: Fail when DNS role is executed on unsupported platform
  fail:
      msg: "The DNS role currently supports Debian, Ubuntu, and RedHat families only."
  when: ansible_facts['os_family'] not in ['Debian', 'Ubuntu', 'RedHat']

- name: Apply RedHat DNS configurations
  when: ansible_facts['os_family'] == 'RedHat'
  include_tasks: RedHat.yml

- name: Apply Debian DNS configurations
  when: ansible_facts['os_family'] == 'Debian' or ansible_facts['os_family'] == 'Ubuntu'
  include_tasks: Debian.yml
