- name: Fail when DHCP role is executed on unsupported platform
  fail:
      msg: "The DHCP role currently supports Debian and RedHat families only."
  when: ansible_facts['os_family'] not in ['Debian', 'RedHat']

- name: Apply Debian DHCP configurations
  when: ansible_facts['os_family'] == 'Debian'
  include_tasks: Debian.yml

- name: Apply RedHat DHCP configurations
  when: ansible_facts['os_family'] == 'RedHat'
  include_tasks: RedHat.yml
